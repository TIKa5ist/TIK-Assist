<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TIK – jouw gids in België</title>

  <style>
    :root {
      --bg: #0b0b0d;
      --primary: #f2c94c;
      --text-main: #f5f5f5;
      --text-soft: #9a9aa3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: sans-serif;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    header {
      padding: 15px;
      border-bottom: 1px solid #333;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-links a {
      margin-left: 15px;
      color: var(--text-soft);
    }

    /* Language switch */
    .lang-floating {
      position: fixed;
      top: 15px;
      right: 15px;
    }

    .lang-toggle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
    }

    .lang-menu {
      display: none;
      background: #111;
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
    }

    .lang-option {
      display: block;
      padding: 10px;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      background: none;
      color: white;
    }

    .lang-option:hover {
      background: #222;
    }

    .lang-option.active {
      background: #333;
      color: var(--primary);
    }

    /* Language blocks */
    .lang-block {
      display: none;
    }

    .lang-block.active {
      display: block;
    }

    .rtl {
      direction: rtl;
      text-align: right;
    }
  </style>
</head>
<body>

<header>
  <div class="container nav">
    <h2>TIK</h2>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Contact</a>
    </div>
  </div>
</header>

<!-- LANGUAGE SWITCH -->
<div class="lang-floating">
  <button class="lang-toggle">🌐</button>
  <div class="lang-menu">
    <button class="lang-option active" data-lang="nl">Nederlands</button>
    <button class="lang-option" data-lang="en">English</button>
    <button class="lang-option" data-lang="fr">Français</button>
    <button class="lang-option" data-lang="ar">العربية</button>
  </div>
</div>

<main class="container">

  <!-- NL -->
  <div class="lang-block active" data-lang-block="nl">
    <h1>Welkom</h1>
    <p>Wij helpen je met alles in België.</p>
  </div>

  <!-- EN -->
  <div class="lang-block" data-lang-block="en">
    <h1>Welcome</h1>
    <p>We help you with everything in Belgium.</p>
  </div>

  <!-- FR -->
  <div class="lang-block" data-lang-block="fr">
    <h1>Bienvenue</h1>
    <p>Nous vous aidons avec tout en Belgique.</p>
  </div>

  <!-- AR -->
  <div class="lang-block" data-lang-block="ar">
    <h1>مرحبا</h1>
    <p>نحن نساعدك في كل شيء في بلجيكا.</p>
  </div>

</main>

<script>
  const toggleBtn = document.querySelector('.lang-toggle');
  const menu = document.querySelector('.lang-menu');
  const options = document.querySelectorAll('.lang-option');
  const blocks = document.querySelectorAll('.lang-block');

  // open/close menu
  toggleBtn.addEventListener('click', () => {
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  });

  // close if outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.lang-floating')) {
      menu.style.display = 'none';
    }
  });

  // switch language
  options.forEach(option => {
    option.addEventListener('click', () => {
      const lang = option.dataset.lang;

      options.forEach(o => o.classList.remove('active'));
      option.classList.add('active');

      blocks.forEach(block => {
        block.classList.toggle(
          'active',
          block.dataset.langBlock === lang
        );
      });

      // RTL fix
      if (lang === 'ar') {
        document.body.classList.add('rtl');
      } else {
        document.body.classList.remove('rtl');
      }

      menu.style.display = 'none';
    });
  });
</script>
<script>
  const toggleBtn = document.querySelector('.lang-toggle');
  const menu = document.querySelector('.lang-menu');
  const options = document.querySelectorAll('.lang-option');
  const blocks = document.querySelectorAll('.lang-block');
  const navLinks = document.querySelectorAll('.nav-links a');
  const specialBtns = document.querySelectorAll('.special-btn');

  // =====================
  // LANGUAGE MENU TOGGLE
  // =====================
  toggleBtn.addEventListener('click', () => {
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  });

  // Klik buiten menu = sluiten
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.lang-floating')) {
      menu.style.display = 'none';
    }
  });

  // =====================
  // LANGUAGE SWITCH
  // =====================
  options.forEach(option => {
    option.addEventListener('click', () => {
      const lang = option.dataset.lang;

      // active knop
      options.forEach(o => o.classList.remove('active'));
      option.classList.add('active');

      // juiste content tonen
      blocks.forEach(block => {
        block.classList.toggle(
          'active',
          block.dataset.langBlock === lang
        );
      });

      // RTL voor arabisch
      document.body.classList.toggle('rtl', lang === 'ar');

      menu.style.display = 'none';
    });
  });

  // =====================
  // NAV LINKS (HEADER)
  // =====================
  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();

      const base = link.getAttribute('href').replace('#', '');
      const activeLang = document.querySelector('.lang-option.active').dataset.lang;

      let targetId = base;

      if (activeLang !== 'nl') {
        targetId = base + '-' + activeLang;
      }

      const target = document.getElementById(targetId);

      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    });
  });
class="special-btn"
id="contact-special"
  // =====================
  // SPECIAL BUTTON → SPECIAL FORM
  // =====================
  specialBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();

      const target = document.getElementById('contact-special');

      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    });
  });
</script>
</body>
</html>
