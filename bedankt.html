<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedankt – TIK</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b0b0d;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #15151b;
      padding: 2rem 2.5rem;
      border-radius: 14px;
      border: 1px solid #2a2a33;
      box-shadow: 0 14px 35px rgba(0,0,0,0.7);
      max-width: 420px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.8rem;
      color: #f2c94c;
    }

    p {
      font-size: 1rem;
      color: #c0c0c0;
      margin-bottom: 1.5rem;
    }

    a {
      display: inline-block;
      background: #f2c94c;
      color: #111;
      padding: 0.8rem 1.4rem;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    a:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Bedankt!</h1>
    <p>We hebben je bericht goed ontvangen.<br>We nemen snel contact met je op.</p>
    <a href="index.html">Terug naar de website</a>
  </div>

</body>
</html>
